<div class="presence-container">
  <h2>Agent Presence</h2>
  <p class="subtitle">
    List of agents with current status and time spent in that status.
  </p>

  <table mat-table [dataSource]="agents" class="mat-elevation-z2 presence-table">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Agent ID</th>
      <td mat-cell *matCellDef="let agent"> {{ agent.id }} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Agent Name</th>
      <td mat-cell *matCellDef="let agent"> {{ agent.name }} </td>
    </ng-container>

    <ng-container matColumnDef="accountCode">
      <th mat-header-cell *matHeaderCellDef>Internal</th>
      <td mat-cell *matCellDef="let agent"> {{ agent.accountCode }} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let agent"> {{ agent.status }} </td>
    </ng-container>

    <ng-container matColumnDef="time">
      <th mat-header-cell *matHeaderCellDef>Time</th>
      <td mat-cell *matCellDef="let agent"> {{ agent.time }} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns;"
      [ngClass]="'status-' + row.status.toLowerCase()">
    </tr>
  </table>
</div>
