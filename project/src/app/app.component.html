<mat-tab-group>
  <mat-tab label="Agents">
    <div style="display: flex; flex-direction: column; padding: 10px;">
        <p style="font-style: italic;">"{{quote}}"</p>
        <p>{{author}}</p>
    </div>

    <table mat-table [dataSource]="agents" style="width: 100%;">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id</th>
        <td mat-cell *matCellDef="let agent"> {{agent.id}} </td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let agent"> {{agent.name}} </td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let agent"> {{agent.email}} </td>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
    </table>
  </mat-tab>

  <mat-tab label="SocketIO">
    <div #socketOutput class="debug">
    </div>
  </mat-tab>

  <mat-tab label="Tail">
    <div #tailOutput class="debug">
    </div>
  </mat-tab>
</mat-tab-group>
